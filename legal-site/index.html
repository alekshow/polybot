<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legal - Creator Trend Agent</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 860px;
      margin: 48px auto;
      padding: 0 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
    }
    h1 { margin-top: 0; }
    p { line-height: 1.55; }
    ul { padding-left: 20px; }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    .small { color: var(--muted); font-size: 14px; margin-top: 20px; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Documentos Legais</h1>
      <p>Pagina publica para cadastro de app no TikTok Developer Portal.</p>
      <ul>
        <li><a href="./terms.html">Terms of Service</a></li>
        <li><a href="./privacy.html">Privacy Policy</a></li>
      </ul>
      <p class="small">
        Atualize os campos com os dados reais da sua organizacao antes de publicar.
      </p>
    </section>
  </main>
</body>
</html>
